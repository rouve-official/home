<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROUVE Music | 24시 개인 연습실</title>

    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #1a1a1b; /* 다크 모드 배경색 */
        }

        /* 럭셔리한 다크 로딩 오버레이 */
        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1b;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999;
        }
        
        .spinner {
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #00d4ff; /* ROUVE 포인트 컬러 */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="font-size: 0.85em; color: #888; margin-top: 15px; letter-spacing: -0.02em;">대관 현황을 확인하고 있습니다...</p>
    </div>

    <iframe 
        id="roomFrame"
        src="https://script.google.com/macros/s/AKfycbzTBeyNthwnr-AqFkVw9X6PUZqMp8pulI3qdAayOw9zKjtQ5MVuX6jA5bXB14zxFJkASw/exec?mode=room" 
        onload="hideLoader()"
        allowfullscreen>
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.transition = 'opacity 0.5s ease';
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
    </script>
</body>
</html>
