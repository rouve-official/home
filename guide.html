<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROUVE 이용 가이드</title>

    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* 로딩 중일 때 보여줄 세련된 스피너 */
        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999;
        }
        .spinner {
            width: 30px; height: 30px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1a1a1a; /* 블랙 포인트 */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="font-size: 0.85em; color: #888; margin-top: 15px; letter-spacing: -0.02em;">가이드를 불러오고 있습니다...</p>
    </div>

    <iframe 
        id="guideFrame"
        src="https://script.google.com/macros/s/AKfycbzTBeyNthwnr-AqFkVw9X6PUZqMp8pulI3qdAayOw9zKjtQ5MVuX6jA5bXB14zxFJkASw/exec?mode=guide" 
        onload="hideLoader()"
        allowfullscreen>
    </iframe>

    <script>
        function hideLoader() {
            // iframe 로드가 끝나면 로딩 화면을 부드럽게 숨깁니다.
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
