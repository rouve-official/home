<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROUVE Music 연습실 예약</title>

    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* ROUVE 스타일의 세련된 블랙 로딩 */
        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1a1a1a; /* 블랙 포인트 */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="font-size: 0.82em; color: #999; margin-top: 15px; letter-spacing: -0.02em;">예약 시스템을 연결 중입니다...</p>
    </div>

    <iframe 
        id="musicFrame"
        src="https://script.google.com/macros/s/AKfycbzTBeyNthwnr-AqFkVw9X6PUZqMp8pulI3qdAayOw9zKjtQ5MVuX6jA5bXB14zxFJkASw/exec?p=music" 
        onload="hideLoader()"
        allow="geolocation; microphone; camera;"
        allowfullscreen>
    </iframe>

    <script>
        function hideLoader() {
            // 로딩 완료 시 부드럽게 사라짐
            const loader = document.getElementById('loader');
            loader.style.transition = 'opacity 0.3s ease';
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 300);
        }
    </script>
</body>
</html>
